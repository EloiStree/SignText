<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Steam Profile Viewer</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #171a21;
            color: white;
            display: flex;
            justify-content: center;
            padding: 40px;
        }

        .profile {
            width: 400px;
            background: #1b2838;
            border-radius: 10px;
            padding: 25px;
            text-align: center;
        }

        .avatar {
            width: 120px;
            height: 120px;
            border-radius: 50%;
        }

        h1 {
            margin: 15px 0;
        }

        .info {
            text-align: left;
            margin-top: 20px;
        }

        .info p {
            border-bottom: 1px solid #334;
            padding: 8px 0;
        }

        a {
            color: #66c0f4;
        }
    </style>
</head>

<body>

<div class="profile">

    <img 
        class="avatar"
        src="https://avatars.steamstatic.com/example_avatar.jpg"
        alt="Steam Avatar"
    >

    <h1>Example Steam User</h1>

    <div class="info">
        <p><strong>Steam ID:</strong> 76561198000000000</p>

        <p>
            <strong>Profile:</strong>
            <a href="https://steamcommunity.com/profiles/76561198000000000">
                View Steam Profile
            </a>
        </p>

        <p><strong>Account Created:</strong> January 2015</p>

        <p><strong>Country:</strong> Belgium</p>

        <p><strong>Status:</strong> Online</p>

        <p><strong>Games Owned:</strong> 120</p>

        <p><strong>Recently Played:</strong> Counter-Strike 2</p>
    </div>

</div>

</body>
</html>
