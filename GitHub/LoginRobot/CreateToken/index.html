<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>GitHub Device Login</title>
<style>
    body {
        background: #000;
        color: #fff;
        font-family: monospace;
        padding: 40px;
        text-align: center;
    }
    .box {
        border: 1px solid white;
        padding: 25px;
        max-width: 600px;
        margin: auto;
    }
    button {
        background: white;
        color: black;
        border: none;
        padding: 12px 25px;
        cursor: pointer;
        font-family: monospace;
        font-weight: bold;
    }
    button:hover { background: #ccc; }
    button:disabled { background: #555; color: #999; cursor: not-allowed; }
    pre {
        border: 1px solid white;
        padding: 15px;
        white-space: pre-wrap;
        word-break: break-all;
        text-align: left;
        margin-top: 15px;
    }
    .error { color: #f85149; }
    .ok { color: #3fb950; }
</style>
</head>
<body>

<div class="box">
    <h1>GitHub Device Login</h1>
    <p style="color:#888">Scope: read:user</p>
    <button id="btn" onclick="startLogin()">Enable Device Flow</button>
    <div id="status"></div>
    <pre id="output"></pre>
</div>

<script>
const btn = document.getElementById('btn');
const status = document.getElementById('status');
const output = document.getElementById('output');

let deviceCode = null;
let interval = null;

async function startLogin() {
    btn.disabled = true;
    status.className = '';
    status.innerHTML = "Requesting device code...";
    output.textContent = "";

    try {
        const res = await fetch('/', {
            method: 'POST',
            headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
            body: new URLSearchParams({ action: 'device_code' })
        });

        const data = await res.json();

        if (data.error) {
            status.className = 'error';
            status.innerHTML = data.error_description || data.error;
            btn.disabled = false;
            return;
        }

        deviceCode = data.device_code;

        output.innerHTML =
`Open this URL:\n${data.verification_uri}\n\nEnter code:\n${data.user_code}\n\nWaiting for authorization...`;

        status.className = '';
        status.innerHTML = "Authorize the device on GitHub.";

        interval = setInterval(checkToken, data.interval * 1000);

    } catch (err) {
        status.className = 'error';
        status.innerHTML = err.message;
        btn.disabled = false;
    }
}

async function checkToken() {
    try {
        const res = await fetch('/', {
            method: 'POST',
            headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
            body: new URLSearchParams({
                action: 'token',
                device_code: deviceCode
            })
        });

        const data = await res.json();

        if (data.access_token) {
            clearInterval(interval);
            status.className = 'ok';
            status.innerHTML = "Login successful.";
            output.textContent = `GitHub Access Token (read:user):\n\n${data.access_token}`;
            btn.disabled = false;
            return;
        }

        if (data.error === 'authorization_pending') return;

        if (data.error === 'slow_down') {
            clearInterval(interval);
            interval = setInterval(checkToken, 10000);
            return;
        }

        if (data.error) {
            clearInterval(interval);
            status.className = 'error';
            status.innerHTML = data.error_description || data.error;
            btn.disabled = false;
        }
    } catch (err) {
        clearInterval(interval);
        status.className = 'error';
        status.innerHTML = err.message;
        btn.disabled = false;
    }
}
</script>

</body>
</html>
