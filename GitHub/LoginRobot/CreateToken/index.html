<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Under Construction</title>
<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }

    body {
        background: #000;
        color: #00ff66;
        font-family: Arial, Helvetica, sans-serif;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        text-align: center;
    }

    .container {
        border: 2px solid #00ff66;
        padding: 50px;
        border-radius: 10px;
        max-width: 500px;
    }

    h1 {
        font-size: 3rem;
        margin-bottom: 20px;
        text-transform: uppercase;
        letter-spacing: 2px;
    }

    p {
        font-size: 1.1rem;
        color: #99ffbb;
        margin-bottom: 30px;
    }

    .loader {
        width: 200px;
        height: 8px;
        background: #222;
        border-radius: 5px;
        margin: auto;
        overflow: hidden;
    }

    .loader::before {
        content: "";
        display: block;
        width: 40%;
        height: 100%;
        background: #00ff66;
        animation: loading 1.5s infinite;
    }

    @keyframes loading {
        0% {
            transform: translateX(-100%);
        }
        100% {
            transform: translateX(350%);
        }
    }
</style>
</head>
<body>

<div class="container">
    <h1>🚧 Under Construction</h1>
    <p>Our website is currently being built.<br>We'll be online soon.</p>

    <div class="loader"></div>
</div>

</body>
</html>
