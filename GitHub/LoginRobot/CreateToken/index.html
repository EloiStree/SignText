<!DOCTYPE html>  

<html lang="en">
<head>
<meta charset="UTF-8">
<title>GitHub Device Login</title>
<style>
    body {
        background: #000;
        color: #fff;
        font-family: monospace;
        padding: 40px;
        text-align: center;
    }

    .box {
        border: 1px solid white;
        padding: 25px;
        max-width: 600px;
        margin: auto;
    }

    button {
        background: white;
        color: black;
        border: none;
        padding: 12px 25px;
        cursor: pointer;
        font-family: monospace;
        font-weight: bold;
    }

    button:hover {
        background: #ccc;
    }

    pre {
        border: 1px solid white;
        padding: 15px;
        white-space: pre-wrap;
        word-break: break-all;
        text-align: left;
    }

    a {
        color: white;
    }
</style>
</head>

<body>

<div class="box">
    <h1>GitHub Device Login</h1>

    <button onclick="startLogin()">Enable Device Flow</button>

    <div id="status"></div>
    <pre id="output"></pre>
</div>


<script>
const CLIENT_ID = "Iv23liTeQ7kcDWDgXOTO";

let deviceCode = null;
let interval = null;

const status = document.getElementById("status");
const output = document.getElementById("output");


async function startLogin() {

    status.innerHTML = "Requesting device code...";
    output.textContent = "";

    const response = await fetch(
        "https://github.com/login/device/code",
        {
            method: "POST",
            headers: {
                "Accept": "application/json",
                "Content-Type": "application/x-www-form-urlencoded"
            },
            body: new URLSearchParams({
                client_id: CLIENT_ID
            })
        }
    );

    const data = await response.json();

    deviceCode = data.device_code;

    output.innerHTML =
`Open:
${data.verification_uri}

Enter code:
${data.user_code}

Waiting for authorization...`;

    status.innerHTML = "Authorize the device in GitHub.";

    interval = setInterval(checkToken, data.interval * 1000);
}


async function checkToken() {

    const response = await fetch(
        "https://github.com/login/oauth/access_token",
        {
            method: "POST",
            headers: {
                "Accept": "application/json",
                "Content-Type": "application/x-www-form-urlencoded"
            },
            body: new URLSearchParams({
                client_id: CLIENT_ID,
                device_code: deviceCode,
                grant_type: "urn:ietf:params:oauth:grant-type:device_code"
            })
        }
    );


    const data = await response.json();


    if (data.access_token) {

        clearInterval(interval);

        status.innerHTML = "Login successful.";

        output.textContent =
`GitHub Access Token:

${data.access_token}`;

        return;
    }


    if (data.error === "authorization_pending") {
        return;
    }


    if (data.error === "slow_down") {
        clearInterval(interval);
        interval = setInterval(checkToken, 10000);
        return;
    }


    if (data.error) {

        clearInterval(interval);

        output.textContent =
`Error:

${data.error}
${data.error_description || ""}`;
    }
}

</script>

</body>
</html>
